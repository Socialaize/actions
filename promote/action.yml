name: Promote function staging to main
description: |
  Syncs .fnconfig.yml to Appwrite, fast-forwards main to the staging tip and
  pushes, then deploys via the shared `Socialaize/actions/deploy` composite. We
  drive the deployment ourselves rather than relying on Appwrite's VCS
  auto-deploy — it lands every deployment in silent mode (activate=false),
  which is the bug this action exists to work around.

  The build+deploy half (FNConfig template merge, runtime detection, baked
  `.npmrc`/`.zreg.env` registry auth, esbuild gate, deploy-functions) lives in
  `Socialaize/actions/deploy@main` and is SHARED with `redeploy`. Previously
  promote carried its own stale deploy step (a bare `sync-fn --mode deploy` with
  no `.npmrc`/`.zreg.env`/build-spec), so a promote-driven deploy failed the
  Appwrite build for every function with `@zlogging`/`zlogging` deps while
  redeploy (which had the auth) succeeded. Sharing the half fixes that for good.

  ZRegistry auth precedence: the per-repo PAT `zregistry-token` (inherited from
  the Socialaize org secret ZREGISTRY_TOKEN) is preferred; if absent, the deploy
  composite falls back to minting a short-lived OIDC client_credentials token
  from zregistry-client-id / zregistry-client-secret. Caller workflows MUST grant
  `packages: read`.
inputs:
  commit-sha:
    description: SHA to merge into main. Defaults to origin/staging tip.
    required: false
    default: ''
  token:
    description: GitHub token with `repo` scope. Pass secrets.GH_DISPATCH_TOKEN.
    required: true
  appwrite-endpoint:
    description: Appwrite endpoint URL
    required: true
  appwrite-project-id:
    description: Appwrite project ID
    required: true
  appwrite-api-key:
    description: Appwrite API key (functions.write)
    required: true
  zregistry-token:
    description: ZRegistry per-repo PAT (zrg_live_) for the @zlogging read scope. Preferred over the OIDC path; inherited from the Socialaize org secret ZREGISTRY_TOKEN.
    required: false
  zregistry-client-id:
    description: Fallback ZRegistry/ZAuth OIDC client id (client_credentials) for the @zlogging scope when zregistry-token is not set.
    required: false
  zregistry-client-secret:
    description: Fallback ZRegistry/ZAuth OIDC client secret for the @zlogging scope when zregistry-token is not set.
    required: false

runs:
  using: composite
  steps:
    - name: Checkout main
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Fetch staging tip
      shell: bash
      env:
        STAGING_SHA: ${{ inputs.commit-sha }}
      run: |
        set -euo pipefail
        git fetch origin staging
        TARGET="${STAGING_SHA:-origin/staging}"
        echo "TARGET=$TARGET" >> "$GITHUB_ENV"

    - name: Check out staging .fnconfig.yml for sync
      shell: bash
      run: |
        set -euo pipefail
        # Grab the staging-tip .fnconfig.yml without changing the checked-out
        # ref (we're on main; sync needs to push the staging spec).
        git show "${TARGET}:.fnconfig.yml" > .fnconfig.staging.yml

    - name: Sync function spec to Appwrite (from staging tip)
      uses: Socialaize/actions/sync-fn@main
      with:
        mode: spec
        appwrite-endpoint: ${{ inputs.appwrite-endpoint }}
        appwrite-project-id: ${{ inputs.appwrite-project-id }}
        appwrite-api-key: ${{ inputs.appwrite-api-key }}
        fnconfig-path: .fnconfig.staging.yml

    - name: Clean up staging fnconfig artifact
      shell: bash
      run: rm -f .fnconfig.staging.yml

    - name: Merge staging into main
      shell: bash
      run: |
        set -euo pipefail
        echo "Merging $TARGET into main"
        git merge --ff-only "$TARGET" || {
          echo "fast-forward failed; falling back to no-ff merge commit"
          git merge --no-ff "$TARGET" -m "Promote staging to main (${TARGET})"
        }
        git push origin main

    - name: Build + deploy to Appwrite (shared)
      uses: Socialaize/actions/deploy@main
      with:
        appwrite-endpoint: ${{ inputs.appwrite-endpoint }}
        appwrite-project-id: ${{ inputs.appwrite-project-id }}
        appwrite-api-key: ${{ inputs.appwrite-api-key }}
        zregistry-token: ${{ inputs.zregistry-token }}
        zregistry-client-id: ${{ inputs.zregistry-client-id }}
        zregistry-client-secret: ${{ inputs.zregistry-client-secret }}
