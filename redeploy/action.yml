name: Force Appwrite redeploy
description: Toggles a .redeploy marker file on main and pushes — triggers Appwrite's git auto-deploy to rebuild the function with current env vars.
inputs:
  token:
    description: GitHub token with `repo` scope. Pass secrets.GH_DISPATCH_TOKEN.
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Toggle .redeploy marker and push
      shell: bash
      run: |
        set -euo pipefail
        if [ -f .redeploy ]; then
          rm .redeploy
          MSG="force redeploy: clear marker"
        else
          date -u +%FT%TZ > .redeploy
          MSG="force redeploy: set marker"
        fi
        git add .redeploy
        git commit -m "$MSG"
        git push origin main
