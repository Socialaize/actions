name: Force Appwrite redeploy
description: |
  Merges staging into main, pushes, then deploys to Appwrite.

  Both TypeScript and Python functions build **inside the Appwrite container**
  (prebuilt: false) — the deploy uploads source only, so there is no node-tar
  crash on bun's lazily-materialized node_modules and no Alpine/musl vs
  glibc native-binary mismatch.

  For the TS path the composite writes a `.npmrc` with baked, short-lived
  tokens — `github.token` for the private `@socialaize` GitHub Packages scope
  and a freshly minted ZRegistry token for the `@zlogging` scope — and SHIPS it
  in the source tarball (`.npmrc` is not in the CLI's ignore list). Appwrite's
  in-container `bun install` / `npm install` reads it. The tokens are expired by
  the time the function actually runs.

  Caller workflows MUST grant `packages: read` and pass zregistry-client-id /
  zregistry-client-secret so the `@zlogging` scope can authenticate.
inputs:
  token:
    description: GitHub token with `repo` scope for the git merge/push (e.g. GH_DISPATCH_TOKEN).
    required: true
  appwrite-endpoint:
    description: Appwrite endpoint URL
    required: true
  appwrite-project-id:
    description: Appwrite project ID
    required: true
  appwrite-api-key:
    description: Appwrite API key (functions.write)
    required: true
  zregistry-client-id:
    description: ZRegistry/ZAuth OIDC client id (client_credentials) for the @zlogging scope on the TS path.
    required: false
  zregistry-client-secret:
    description: ZRegistry/ZAuth OIDC client secret for the @zlogging scope on the TS path.
    required: false

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Merge staging into main
      shell: bash
      run: |
        set -euo pipefail
        git fetch origin staging
        echo "Merging origin/staging into main"
        git merge --ff-only origin/staging || {
          echo "fast-forward failed; falling back to no-ff merge commit"
          git merge --no-ff origin/staging -m "Merge staging into main (force redeploy)"
        }
        git push origin main

    - name: Detect runtime + select deploy mode
      id: mode
      shell: bash
      run: |
        set -euo pipefail
        runtime=""
        cmd=""
        if [ -f .fnconfig.yml ]; then
          runtime="$(yq -r '.runtime // ""' .fnconfig.yml 2>/dev/null || echo '')"
          cmd="$(yq -r '.commands // ""' .fnconfig.yml 2>/dev/null || echo '')"
        fi
        echo "Detected runtime: $runtime"
        echo "Detected commands: $cmd"
        case "$runtime" in
          python*|*python*)
            is_python=true
            ;;
          *)
            is_python=false
            ;;
        esac
        echo "is_python=$is_python" >> "$GITHUB_OUTPUT"
        # Quote commands for downstream consumers — empty string allowed.
        {
          echo 'commands<<EOF'
          echo "$cmd"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"

    - name: Write .npmrc (TS only) — baked tokens, shipped in the tarball for the in-container build
      if: steps.mode.outputs.is_python != 'true'
      shell: bash
      env:
        NPM_TOKEN: ${{ github.token }}
        ZREGISTRY_CLIENT_ID: ${{ inputs.zregistry-client-id }}
        ZREGISTRY_CLIENT_SECRET: ${{ inputs.zregistry-client-secret }}
      run: |
        ZREG_TOKEN=$(curl -s -u "$ZREGISTRY_CLIENT_ID:$ZREGISTRY_CLIENT_SECRET" -X POST https://auth.blackleafdigital.com/v1/oidc/token -d grant_type=client_credentials -d 'scope=packages.publish' | jq -r .access_token)
        cat > .npmrc <<NPMRC
        @socialaize:registry=https://npm.pkg.github.com
        //npm.pkg.github.com/:_authToken=${NPM_TOKEN}
        @zlogging:registry=https://registry.blackleafdigital.com/npm/
        //registry.blackleafdigital.com/npm/:_authToken=${ZREG_TOKEN}
        NPMRC

    - name: Deploy + activate (Appwrite-side build) via Appwrite API (TS path)
      if: steps.mode.outputs.is_python != 'true'
      uses: ZachHandley/AppwriteUtils/actions/deploy-functions@dev
      env:
        GH_TOKEN: ${{ github.token }}
      with:
        endpoint: ${{ inputs.appwrite-endpoint }}
        project-id: ${{ inputs.appwrite-project-id }}
        api-key: ${{ inputs.appwrite-api-key }}
        prebuilt: 'false'
        commands: ${{ steps.mode.outputs.commands }}

    - name: Deploy via Appwrite-side build (Python path)
      if: steps.mode.outputs.is_python == 'true'
      uses: ZachHandley/AppwriteUtils/actions/deploy-functions@dev
      env:
        GH_TOKEN: ${{ github.token }}
      with:
        endpoint: ${{ inputs.appwrite-endpoint }}
        project-id: ${{ inputs.appwrite-project-id }}
        api-key: ${{ inputs.appwrite-api-key }}
        prebuilt: 'false'
        commands: ${{ steps.mode.outputs.commands }}
