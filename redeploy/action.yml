name: Force Appwrite redeploy
description: |
  Merges staging into main, pushes, then uploads + activates a fresh
  deployment via the Appwrite API. The API-driven activate is what
  guarantees the new build replaces the live deployment — Appwrite's VCS
  auto-deploy lands every push in silent mode (activate=false), so we
  cannot rely on the push alone.
inputs:
  token:
    description: GitHub token with `repo` scope. Pass secrets.GH_DISPATCH_TOKEN.
    required: true
  appwrite-endpoint:
    description: Appwrite endpoint URL
    required: true
  appwrite-project-id:
    description: Appwrite project ID
    required: true
  appwrite-api-key:
    description: Appwrite API key (functions.write)
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Merge staging into main
      shell: bash
      run: |
        set -euo pipefail
        git fetch origin staging
        echo "Merging origin/staging into main"
        git merge --ff-only origin/staging || {
          echo "fast-forward failed; falling back to no-ff merge commit"
          git merge --no-ff origin/staging -m "Merge staging into main (force redeploy)"
        }
        git push origin main

    - name: Deploy + activate via Appwrite API
      uses: Socialaize/actions/sync-fn@main
      with:
        mode: deploy
        activate: 'true'
        appwrite-endpoint: ${{ inputs.appwrite-endpoint }}
        appwrite-project-id: ${{ inputs.appwrite-project-id }}
        appwrite-api-key: ${{ inputs.appwrite-api-key }}
