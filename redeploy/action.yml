name: Force Appwrite redeploy
description: |
  Merges staging into main, pushes, builds the function inside GitHub
  Actions (so we can authenticate to GitHub Packages with the caller
  workflow's GITHUB_TOKEN), then uploads + activates a prebuilt
  deployment via the Appwrite API. The build runs in Actions because
  the Appwrite build container has no GitHub Packages credentials —
  the committed `.npmrc` referencing `${GH_TOKEN}` is not expanded by
  bun, and per-function Appwrite variables don't include GH_TOKEN.

  Caller workflows MUST grant `packages: read` permission so the
  composite can use `github.token` against npm.pkg.github.com.
inputs:
  token:
    description: GitHub token with `repo` scope for the git merge/push (e.g. GH_DISPATCH_TOKEN).
    required: true
  appwrite-endpoint:
    description: Appwrite endpoint URL
    required: true
  appwrite-project-id:
    description: Appwrite project ID
    required: true
  appwrite-api-key:
    description: Appwrite API key (functions.write)
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Configure git identity
      shell: bash
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Merge staging into main
      shell: bash
      run: |
        set -euo pipefail
        git fetch origin staging
        echo "Merging origin/staging into main"
        git merge --ff-only origin/staging || {
          echo "fast-forward failed; falling back to no-ff merge commit"
          git merge --no-ff origin/staging -m "Merge staging into main (force redeploy)"
        }
        git push origin main

    - name: Write .npmrc for npm.pkg.github.com auth
      shell: bash
      env:
        NPM_TOKEN: ${{ github.token }}
      run: |
        cat > .npmrc <<EOF
        @socialaize:registry=https://npm.pkg.github.com
        //npm.pkg.github.com/:_authToken=${NPM_TOKEN}
        EOF

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: '22'

    - name: Install + (optional) build function deps
      shell: bash
      env:
        NODE_OPTIONS: '--max-old-space-size=4096'
        # Use the caller's PAT (GH_DISPATCH_TOKEN) — has cross-repo Contents:read so
        # Python build.sh can `git clone Socialaize/Socialaize` for socialaize-shared-py.
        # github.token only scopes to the calling repo, which 404s the cross-repo clone.
        GH_TOKEN: ${{ inputs.token }}
        # Appwrite open-runtimes for bun-* and node-* use Alpine (musl), not glibc.
        # Force npm/bun to install the linuxmusl-x64 native variants (e.g. sharp's
        # @img/sharp-linuxmusl-x64) so the tarball boots in Appwrite's container.
        npm_config_platform: linux
        npm_config_libc: musl
        npm_config_arch: x64
        npm_config_target_platform: linux
        npm_config_target_libc: musl
        npm_config_target_arch: x64
      run: |
        set -euo pipefail
        if [ -f .fnconfig.yml ]; then
          cmd="$(yq -r '.commands // ""' .fnconfig.yml 2>/dev/null || echo '')"
          if [ -n "$cmd" ]; then
            echo "Running .fnconfig commands: $cmd"
            bash -c "$cmd"
          fi
        fi
        if [ ! -d node_modules ]; then
          if [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun add @socialaize/shared@latest
            bun install
          elif [ -f package.json ]; then
            npm install @socialaize/shared@latest
            npm install
          fi
        fi

    - name: Remove .npmrc before packaging
      shell: bash
      run: rm -f .npmrc

    - name: Deploy + activate (prebuilt) via Appwrite API
      uses: ZachHandley/AppwriteUtils/actions/deploy-functions@dev
      env:
        GH_TOKEN: ${{ github.token }}
      with:
        endpoint: ${{ inputs.appwrite-endpoint }}
        project-id: ${{ inputs.appwrite-project-id }}
        api-key: ${{ inputs.appwrite-api-key }}
        prebuilt: 'true'
        commands: ':'
